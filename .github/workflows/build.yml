name: Build

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --locked

      - name: Build release
        run: cargo build --release --locked

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static Linux amd64 binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Package release asset
        run: |
          cp target/x86_64-unknown-linux-musl/release/marzban-node marzban-node-linux-amd64
          chmod 0755 marzban-node-linux-amd64
          sha256sum marzban-node-linux-amd64 > marzban-node-linux-amd64.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            marzban-node-linux-amd64
            marzban-node-linux-amd64.sha256
